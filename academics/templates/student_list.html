<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Student List</h2>
    <form method="GET" action="/search/" class="mb-3">
        <input type="text" name="q" placeholder="Search student by name" class="form-control">
        <button type="submit" class="btn btn-primary mt-2">Search</button>
    </form>

    <table class="table table-hover table-sm bg-white shadow-sm align-middle">
        <thead class="table-dark">
            <tr>
                
                <th>Name</th>
                <th>Student ID</th>
                <th>Department</th>
                <th>Email</th>
                <th>GPA</th>
               <th class="text-center" style="width: 180px;">Action</th>
            </tr>
        </thead>

        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.student_id }}</td>
                <td>{{ student.department }}</td>
                <td>{{ student.email }}</td>
                <td>
                    <a href="/gpa/{{ student.id }}/" class="btn btn-sm btn-success">View GPA</a>
                    
                </td>
                <td style="white-space: nowrap;" class="text-center">
                    <a href="/edit-student/{{ student.id }}/"
                    class="btn btn-warning btn-sm me-2">Edit</a>

                    <a href="/delete-student/{{ student.id }}/"
                    class="btn btn-danger btn-sm"
                    onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Back Home</a>
</div>

</body>
</html>
